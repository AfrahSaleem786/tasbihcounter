<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="google-site-verification" content="r3PItotl-3LgwsDCA1NLmUXFkApLHjNHbGMhXUKUolQ" />

    <meta name="description"
          content="Free online tasbih counter. Count SubhanAllah, Alhamdulillah, Allahu Akbar with digital tasbih counter. Works on mobile and desktop.">

    <meta name="keywords"
          content="tasbih counter, online tasbih counter, dhikr counter, digital tasbih, tasbeeh counter, zikr counter">

    <meta name="robots" content="index, follow">

    <title>Tasbih Counter Online – Free Digital Tasbih Counter for Dhikr</title>

    <link rel="stylesheet" href="style.css?v=20260306_1">

</head>


    <body class="dark">

        <div class="container">

            <h1>📿 Online Tasbih Counter</h1>

            <div id="counter">0</div>

            <div id="targetStatus" aria-live="polite"></div>

            <div id="progressWrap" class="progress" aria-hidden="true">
                <div id="progressBar" class="progressBar"></div>
            </div>


            <!-- MAIN CONTROLS -->
            <div class="controls">

                <button id="minusBtn" aria-label="Decrease count">−</button>

                <button id="countBtn" aria-label="Increase count">+1</button>

                <button id="resetBtn" aria-label="Reset count">Reset</button>

                <button id="modeBtn" aria-label="Toggle dark or light mode">Dark Mode</button>

            </div>

            <div class="settings">
                <label class="toggle">
                    <input id="stopAtTargetToggle" type="checkbox">
                    <span>Stop at target</span>
                </label>
            </div>


            <!-- PRESET TARGET BUTTONS -->
            <div class="presets">

                <button id="preset33" type="button">33</button>

                <button id="preset99" type="button">99</button>

                <button id="preset100" type="button">100</button>

                <button id="preset1000" type="button">1000</button>

                <button id="clearTargetBtn" type="button">No Target</button>

            </div>

            <div class="customTarget">
                <input id="customTargetInput" type="number" inputmode="numeric" min="1" step="1" placeholder="Custom target" aria-label="Custom target">
                <button id="setCustomTargetBtn" type="button">Set</button>
            </div>

            <div id="toast" class="toast" role="status" aria-live="polite" aria-atomic="true"></div>

        </div>


        <script src="script.js?v=20260306_1"></script>

    </body>

</html>
